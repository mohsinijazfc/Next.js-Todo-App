name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nextjs-todo-app .

      - name: Run Docker container
        run: docker run -d -p 3000:3000 nextjs-todo-app

      - name: Check container is running
        run: docker ps
